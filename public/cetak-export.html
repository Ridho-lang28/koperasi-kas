                <a href="cetak-export.html" class="flex items-center gap-3 px-4 py-3 bg-primary text-white transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><span class="font-medium">Cetak & Export</span></a>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-gray-400 hover:text-white hover:bg-gray-800 rounded-lg transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>Keluar</button>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">Cetak & Export Laporan</h1>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-2">📊 Export Laporan Keuangan</h3>
                    <p class="text-sm text-gray-500 mb-6">Pilih periode dan format file yang diinginkan.</p>
                    
                    <div class="flex flex-wrap gap-4 items-end mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Dari Bulan</label>
                            <input type="month" id="exportFrom" class="px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sampai Bulan</label>
                            <input type="month" id="exportTo" class="px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-3">
                        <button onclick="exportPDF()" class="px-6 py-3 bg-red-600 text-white font-medium rounded-xl hover:bg-red-700 transition flex items-center gap-2 shadow-lg shadow-red-500/20">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Export PDF
                        </button>
                        <button onclick="exportExcel()" class="px-6 py-3 bg-green-600 text-white font-medium rounded-xl hover:bg-green-700 transition flex items-center gap-2 shadow-lg shadow-green-500/20">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Export Excel
                        </button>
                        <button onclick="window.print()" class="px-6 py-3 bg-gray-600 text-white font-medium rounded-xl hover:bg-gray-700 transition flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-2"> Export Data Anggota</h3>
                    <p class="text-sm text-gray-500 mb-6">Download daftar anggota koperasi dalam format PDF atau Excel.</p>
                    
                    <div class="flex flex-wrap gap-3">
                        <button onclick="exportMembersPDF()" class="px-5 py-2.5 border border-red-500 text-red-600 font-medium rounded-xl hover:bg-red-50 transition flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Anggota ke PDF
                        </button>
                        <button onclick="exportMembersExcel()" class="px-5 py-2.5 border border-green-500 text-green-600 font-medium rounded-xl hover:bg-green-50 transition flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Anggota ke Excel
                        </button>
                    </div>

    <script src="script.js"></script>
    <script>
        // Set default period
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const prevM = now.getMonth() === 0 ? `${y-1}-12` : `${y}-${String(now.getMonth()).padStart(2, '0')}`;
            document.getElementById('exportFrom').value = prevM;
            document.getElementById('exportTo').value = `${y}-${m}`;
        });

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const from = document.getElementById('exportFrom').value;
            const to = document.getElementById('exportTo').value;

            const savings = JSON.parse(localStorage.getItem('koperasikas_savings') || '[]').filter(s => s.date >= from && s.date <= to + '-31');
            const expenses = JSON.parse(localStorage.getItem('koperasikas_expenses') || '[]').filter(e => e.date >= from && e.date <= to + '-31');
            const totalIncome = savings.reduce((sum, s) => sum + parseFloat(s.amount), 0);
            const totalExpense = expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0);

            doc.setFontSize(22);
            doc.setTextColor(220, 27, 51);
            doc.text('KoperasiKas', 14, 20);
            doc.setFontSize(12);
            doc.setTextColor(80);
            doc.text('Laporan Keuangan Koperasi', 14, 28);
            doc.text(`Periode: ${from} s/d ${to}  |  Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 14, 36);

            doc.setDrawColor(220, 27, 51);
            doc.setLineWidth(0.8);
            doc.line(14, 40, 196, 40);

            doc.setFontSize(14);
            doc.setTextColor(0);
            doc.text(`Total Pemasukan: ${formatRupiah(totalIncome)}`, 14, 52);
            doc.text(`Total Pengeluaran: ${formatRupiah(totalExpense)}`, 14, 60);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(59, 130, 246);
            doc.text(`Saldo: ${formatRupiah(totalIncome - totalExpense)}`, 14, 70);

            doc.setFont(undefined, 'normal');
            doc.setFontSize(12);
            doc.setTextColor(0);
            doc.text('Rincian Pemasukan:', 14, 84);

            doc.autoTable({
                startY: 90,
                head: [['Tanggal', 'Nama Anggota', 'Jenis', 'Jumlah']],
                body: savings.map(s => [s.date, s.memberName, s.type, formatRupiah(s.amount)]),
                theme: 'grid',
                headStyles: { fillColor: [16, 185, 129] }
            });

            let finalY = doc.lastAutoTable.finalY + 14;
            doc.text('Rincian Pengeluaran:', 14, finalY);

            doc.autoTable({
                startY: finalY + 6,
                head: [['Tanggal', 'Kategori', 'Keterangan', 'Jumlah']],
                body: expenses.map(e => [e.date, e.category, e.note, formatRupiah(e.amount)]),
                theme: 'grid',
                headStyles: { fillColor: [220, 27, 51] }
            });

            doc.save(`Laporan_KoperasiKas_${from}_${to}.pdf`);
            showToast('PDF berhasil di-download!', 'success');
        }

        function exportExcel() {
            const from = document.getElementById('exportFrom').value;
            const to = document.getElementById('exportTo').value;
            const savings = JSON.parse(localStorage.getItem('koperasikas_savings') || '[]').filter(s => s.date >= from && s.date <= to + '-31');
            const expenses = JSON.parse(localStorage.getItem('koperasikas_expenses') || '[]').filter(e => e.date >= from && e.date <= to + '-31');
            const totalIncome = savings.reduce((sum, s) => sum + parseFloat(s.amount), 0);
            const totalExpense = expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0);

            const wb = XLSX.utils.book_new();

            const incomeSheet = [['Tanggal', 'Nama Anggota', 'Jenis Simpanan', 'Jumlah']];
            savings.forEach(s => incomeSheet.push([s.date, s.memberName, s.type, s.amount]));
            incomeSheet.push([]);
            incomeSheet.push(['TOTAL', '', '', totalIncome]);
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(incomeSheet), 'Pemasukan');

            const expenseSheet = [['Tanggal', 'Kategori', 'Keterangan', 'Jumlah']];
            expenses.forEach(e => expenseSheet.push([e.date, e.category, e.note, e.amount]));
            expenseSheet.push([]);
            expenseSheet.push(['TOTAL', '', '', totalExpense]);
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(expenseSheet), 'Pengeluaran');

            const summarySheet = [['Ringkasan Laporan Keuangan'], ['Periode', `${from} s/d ${to}`], [''], ['Total Pemasukan', totalIncome], ['Total Pengeluaran', totalExpense], ['Saldo', totalIncome - totalExpense]];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summarySheet), 'Ringkasan');

            XLSX.writeFile(wb, `Laporan_KoperasiKas_${from}_${to}.xlsx`);
            showToast('Excel berhasil di-download!', 'success');
        }

        function exportMembersPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const members = JSON.parse(localStorage.getItem('koperasikas_members') || '[]');

            doc.setFontSize(20);
            doc.setTextColor(220, 27, 51);
            doc.text('KoperasiKas', 14, 20);
            doc.setFontSize(12);
            doc.setTextColor(80);
            doc.text('Data Anggota Koperasi', 14, 28);
            doc.text(`Tanggal: ${new Date().toLocaleDateString('id-ID')}`, 14, 36);
            doc.line(14, 40, 196, 40);

            doc.autoTable({
                startY: 48,
                head: [['No', 'NIK', 'Nama', 'Telepon', 'Alamat', 'Tgl Gabung', 'Status']],
                body: members.map((m, i) => [i + 1, m.nik, m.name, m.phone || '-', m.address || '-', m.joinDate, m.status]),
                theme: 'grid',
                headStyles: { fillColor: [220, 27, 51] }
            });

            doc.save('Data_Anggota_KoperasiKas.pdf');
            showToast('PDF data anggota berhasil di-download!', 'success');
        }

        function exportMembersExcel() {
            const members = JSON.parse(localStorage.getItem('koperasikas_members') || '[]');
            const wb = XLSX.utils.book_new();
            const data = [['No', 'NIK', 'Nama Lengkap', 'Telepon', 'Alamat', 'Tanggal Bergabung', 'Status']];
            members.forEach((m, i) => data.push([i + 1, m.nik, m.name, m.phone || '-', m.address || '-', m.joinDate, m.status]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Data Anggota');
            XLSX.writeFile(wb, 'Data_Anggota_KoperasiKas.xlsx');
            showToast('Excel data anggota berhasil di-download!', 'success');
        }
    </script>
