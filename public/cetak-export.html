    <script src="script.js"></script>
    <script>
        // Set default period
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const prevM = now.getMonth() === 0 ? `${y-1}-12` : `${y}-${String(now.getMonth()).padStart(2, '0')}`;
            document.getElementById('exportFrom').value = prevM;
            document.getElementById('exportTo').value = `${y}-${m}`;
        });

        // FUNGSI HELPER UNTUK AMBIL DATA DENGAN VALIDASI
        async function getExportData() {
            const from = document.getElementById('exportFrom').value;
            const to = document.getElementById('exportTo').value;

            if (!from || !to) {
                throw new Error('Silakan pilih periode Dari dan Sampai bulan terlebih dahulu!');
            }

            const toDateEnd = to + '-31';

            try {
                const [resMembers, resSavings, resExpenses] = await Promise.all([
                    fetch('/api/anggota.js'),
                    fetch('/api/simpanan.js'),
                    fetch('/api/pengeluaran.js')
                ]);

                if (!resMembers.ok || !resSavings.ok || !resExpenses.ok) {
                    throw new Error('Gagal terhubung ke server database.');
                }

                const members = await resMembers.json();
                const allSavings = await resSavings.json();
                const allExpenses = await resExpenses.json();

                // Filter berdasarkan periode
                const savings = allSavings.filter(s => s.tanggal >= from && s.tanggal <= toDateEnd);
                const expenses = allExpenses.filter(e => e.tanggal >= from && e.tanggal <= toDateEnd);
                
                return { members, savings, expenses };
            } catch (err) {
                console.error('Fetch Error:', err);
                throw err;
            }
        }

        // EXPORT PDF LAPORAN KEUANGAN
        async function exportPDF() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const from = document.getElementById('exportFrom').value;
                const to = document.getElementById('exportTo').value;
                
                const { savings, expenses } = await getExportData();
                const totalIncome = savings.reduce((sum, s) => sum + parseFloat(s.nominal || 0), 0);
                const totalExpense = expenses.reduce((sum, e) => sum + parseFloat(e.nominal || 0), 0);

                doc.setFontSize(22);
                doc.setTextColor(220, 27, 51);
                doc.text('KoperasiKas', 14, 20);
                doc.setFontSize(12);
                doc.setTextColor(80);
                doc.text('Laporan Keuangan Koperasi', 14, 28);
                doc.text(`Periode: ${from} s/d ${to} | Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 14, 36);

                doc.setDrawColor(220, 27, 51);
                doc.setLineWidth(0.8);
                doc.line(14, 40, 196, 40);

                doc.setFontSize(14);
                doc.setTextColor(0);
                doc.text(`Total Pemasukan: ${formatRupiah(totalIncome)}`, 14, 52);
                doc.text(`Total Pengeluaran: ${formatRupiah(totalExpense)}`, 14, 60);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(59, 130, 246);
                doc.text(`Saldo: ${formatRupiah(totalIncome - totalExpense)}`, 14, 70);

                doc.setFont(undefined, 'normal');
                doc.setFontSize(12);
                doc.setTextColor(0);
                doc.text('Rincian Pemasukan:', 14, 84);

                doc.autoTable({
                    startY: 90,
                    head: [['Tanggal', 'Nama Anggota', 'Jenis', 'Jumlah']],
                    body: savings.map(s => [formatTanggal(s.tanggal), s.nama_anggota, s.jenis_simpanan, formatRupiah(s.nominal)]),
                    theme: 'grid',
                    headStyles: { fillColor: [16, 185, 129] }
                });

                let finalY = doc.lastAutoTable.finalY + 14;
                doc.text('Rincian Pengeluaran:', 14, finalY);

                doc.autoTable({
                    startY: finalY + 6,
                    head: [['Tanggal', 'Kategori', 'Keterangan', 'Jumlah']],
                    body: expenses.map(e => [formatTanggal(e.tanggal), e.kategori, e.keterangan || '-', formatRupiah(e.nominal)]),
                    theme: 'grid',
                    headStyles: { fillColor: [220, 27, 51] }
                });

                doc.save(`Laporan_KoperasiKas_${from}_${to}.pdf`);
                showToast('PDF berhasil di-download!', 'success');
            } catch (err) {
                showToast(err.message || 'Gagal membuat PDF.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // EXPORT EXCEL LAPORAN KEUANGAN
        async function exportExcel() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;

            try {
                const from = document.getElementById('exportFrom').value;
                const to = document.getElementById('exportTo').value;
                
                const { savings, expenses } = await getExportData();
                const totalIncome = savings.reduce((sum, s) => sum + parseFloat(s.nominal || 0), 0);
                const totalExpense = expenses.reduce((sum, e) => sum + parseFloat(e.nominal || 0), 0);

                const wb = XLSX.utils.book_new();

                const incomeSheet = [['Tanggal', 'Nama Anggota', 'Jenis Simpanan', 'Jumlah']];
                savings.forEach(s => incomeSheet.push([formatTanggal(s.tanggal), s.nama_anggota, s.jenis_simpanan, s.nominal]));
                incomeSheet.push([]);
                incomeSheet.push(['TOTAL', '', '', totalIncome]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(incomeSheet), 'Pemasukan');

                const expenseSheet = [['Tanggal', 'Kategori', 'Keterangan', 'Jumlah']];
                expenses.forEach(e => expenseSheet.push([formatTanggal(e.tanggal), e.kategori, e.keterangan || '-', e.nominal]));
                expenseSheet.push([]);
                expenseSheet.push(['TOTAL', '', '', totalExpense]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(expenseSheet), 'Pengeluaran');

                const summarySheet = [['Ringkasan Laporan Keuangan'], ['Periode', `${from} s/d ${to}`], [''], ['Total Pemasukan', totalIncome], ['Total Pengeluaran', totalExpense], ['Saldo', totalIncome - totalExpense]];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summarySheet), 'Ringkasan');

                XLSX.writeFile(wb, `Laporan_KoperasiKas_${from}_${to}.xlsx`);
                showToast('Excel berhasil di-download!', 'success');
            } catch (err) {
                showToast(err.message || 'Gagal membuat Excel.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // EXPORT ANGGOTA KE PDF
        async function exportMembersPDF() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const { members } = await getExportData();

                doc.setFontSize(20);
                doc.setTextColor(220, 27, 51);
                doc.text('KoperasiKas', 14, 20);
                doc.setFontSize(12);
                doc.setTextColor(80);
                doc.text('Data Anggota Koperasi', 14, 28);
                doc.text(`Tanggal: ${new Date().toLocaleDateString('id-ID')}`, 14, 36);
                doc.line(14, 40, 196, 40);

                doc.autoTable({
                    startY: 48,
                    head: [['No', 'NIK', 'Nama', 'Telepon', 'Alamat', 'Tgl Gabung', 'Status']],
                    body: members.map((m, i) => [i + 1, m.nik, m.nama_anggota, m.no_hp || '-', m.alamat || '-', formatTanggal(m.tanggal_gabung), m.status]),
                    theme: 'grid',
                    headStyles: { fillColor: [220, 27, 51] }
                });

                doc.save('Data_Anggota_KoperasiKas.pdf');
                showToast('PDF data anggota berhasil di-download!', 'success');
            } catch (err) {
                showToast(err.message || 'Gagal membuat PDF anggota.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // EXPORT ANGGOTA KE EXCEL (SUDAH AMAN, TAPI DIBERIKAN TRY-CATCH JUGA)
        async function exportMembersExcel() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;

            try {
                const { members } = await getExportData();
                const wb = XLSX.utils.book_new();
                const data = [['No', 'NIK', 'Nama Lengkap', 'Telepon', 'Alamat', 'Tanggal Bergabung', 'Status']];
                members.forEach((m, i) => data.push([i + 1, m.nik, m.nama_anggota, m.no_hp || '-', m.alamat || '-', m.tanggal_gabung, m.status]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Data Anggota');
                XLSX.writeFile(wb, 'Data_Anggota_KoperasiKas.xlsx');
                showToast('Excel data anggota berhasil di-download!', 'success');
            } catch (err) {
                showToast(err.message || 'Gagal membuat Excel anggota.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
