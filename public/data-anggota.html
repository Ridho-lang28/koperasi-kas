<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Anggota - KoperasiKas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#DC1B33',
                        dark: '#1e1e2e'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #374151;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #DC1B33;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(220, 27, 51, 0.08);
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #DC1B33;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(220, 27, 51, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">
        
        <!-- ===== SIDEBAR (ORIGINAL - TIDAK BERUBAH) ===== -->
        <aside class="w-64 bg-dark text-white flex flex-col hidden md:flex">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center gap-3">

                    <span class="text-xl font-bold">KoperasiKas</span>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4">
                <div class="px-4 mb-2 text-xs font-semibold text-gray-500 uppercase">Menu Utama</div>
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg><span class="font-medium">Dashboard</span></a>
                <a href="data-anggota.html" class="flex items-center gap-3 px-4 py-3 bg-primary text-white transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span class="font-medium">Data Anggota</span></a>
                <a href="simpanan.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="font-medium">Simpanan</span></a>
                <a href="pengeluaran.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span class="font-medium">Pengeluaran</span></a>
                <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-500 uppercase">Laporan</div>
                <a href="laporan.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><span class="font-medium">Laporan</span></a>
                <a href="grafik.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg><span class="font-medium">Grafik Keuangan</span></a>
                <a href="cetak-export.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><span class="font-medium">Cetak & Export</span></a>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-gray-400 hover:text-white hover:bg-gray-800 rounded-lg transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>Keluar</button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="flex-1 flex flex-col overflow-hidden">
            
            <!-- TOPBAR -->
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">Data Anggota</h1>
            </header>

            <!-- CONTENT -->
            <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-gray-50">
                
                <!-- Page Header Section -->
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <div>
                        <h2 class="text-xl font-bold text-gray-900">Data Anggota</h2>
                        <p class="text-sm text-gray-500 mt-0.5" id="memberCountLabel">Memuat data...</p>
                    </div>
                    <button onclick="openMemberModal()" class="px-5 py-2.5 bg-primary text-white font-medium rounded-xl hover:bg-red-700 transition flex items-center gap-2 shadow-lg shadow-red-500/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Tambah Anggota
                    </button>
                </div>

                <!-- CARD: TABLE -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    
                    <!-- Search Bar -->
                    <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                        <div class="relative max-w-md">
                            <svg class="w-4 h-4 text-gray-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            <input type="text" id="searchMember" placeholder="Cari nama, ID, atau NIK..." class="search-input">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">ID Anggota</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">NIK</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">Nama</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">Telepon</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">Alamat</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">Tgl Bergabung</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-gray-600 uppercase tracking-wider text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="memberTableBody" class="divide-y divide-gray-100">
                                <!-- Data diisi JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyMember" class="hidden text-center py-12 text-gray-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <p class="text-sm">Belum ada data anggota.</p>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- MODAL ANGGOTA -->
    <div id="memberModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-xl animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800" id="modalTitle">Tambah Anggota</h3>
                <button onclick="closeMemberModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <form id="memberForm" class="space-y-4">
                <input type="hidden" id="memberId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">NIK</label>
                        <input type="text" id="memberNIK" class="form-input" placeholder="16 digit NIK">
                    </div>
                    <div>
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="memberName" required class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Telepon</label>
                        <input type="text" id="memberPhone" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Tanggal Bergabung</label>
                        <input type="date" id="memberDate" required class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">Alamat</label>
                    <textarea id="memberAddress" rows="2" class="form-input"></textarea>
                </div>
                <div>
                    <label class="form-label">Status</label>
                    <select id="memberStatus" class="form-input bg-white">
                        <option value="Aktif">Aktif</option>
                        <option value="Tidak Aktif">Tidak Aktif</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeMemberModal()" class="px-5 py-2 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50">Batal</button>
                    <button type="submit" class="px-5 py-2 bg-primary text-white rounded-xl hover:bg-red-700">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // GLOBAL VARIABLES
        let allMembers = [];

        function formatTanggal(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        // FETCH DATA DARI API
        async function fetchMembers() {
            try {
                const res = await fetch('/api/anggota.js');
                if (!res.ok) throw new Error('Gagal mengambil data');
                allMembers = await res.json();
                renderMembers();
            } catch (err) {
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal memuat data anggota dari server.' });
            }
        }

        function renderMembers() {
            const search = document.getElementById('searchMember').value.toLowerCase();
            
            const filtered = allMembers.filter(m => {
                const matchSearch = m.nama_anggota.toLowerCase().includes(search) || 
                                    String(m.id_anggota).toLowerCase().includes(search) ||
                                    (m.nik && m.nik.includes(search)) ||
                                    (m.alamat && m.alamat.toLowerCase().includes(search));
                return matchSearch;
            });

            const tbody = document.getElementById('memberTableBody');
            const empty = document.getElementById('emptyMember');
            const label = document.getElementById('memberCountLabel');
            
            label.textContent = `${filtered.length} dari ${allMembers.length} anggota`;

            tbody.innerHTML = '';
            if (filtered.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            filtered.forEach((m) => {
                const statusClass = m.status === 'Aktif' 
                    ? 'bg-green-50 text-green-700 border border-green-100' 
                    : 'bg-gray-50 text-gray-600 border border-gray-200';

                tbody.innerHTML += `
                <tr class="hover:bg-gray-50/50 transition">
                    <td class="px-6 py-4 text-sm font-semibold text-gray-800">${m.id_anggota || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700 font-mono">${m.nik || '-'}</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${m.nama_anggota}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${m.no_hp || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700 max-w-xs truncate" title="${m.alamat || ''}">${m.alamat || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${formatTanggal(m.tanggal_gabung)}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 text-xs font-semibold rounded-full ${statusClass}">${m.status}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="editMember(${m.id_anggota})" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg transition" title="Edit">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="confirmDelete(${m.id_anggota}, '${m.nama_anggota.replace(/'/g, "\\'")}')" class="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Hapus">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `});
        }

        // Modal Functions
        function openMemberModal() {
            document.getElementById('memberModal').classList.remove('hidden');
            document.getElementById('memberModal').classList.add('flex');
            document.getElementById('memberForm').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('modalTitle').textContent = 'Tambah Anggota';
            document.getElementById('memberDate').value = new Date().toISOString().split('T')[0];
        }

        function closeMemberModal() {
            document.getElementById('memberModal').classList.add('hidden');
            document.getElementById('memberModal').classList.remove('flex');
        }

        function editMember(id) {
            const member = allMembers.find(m => m.id_anggota === id);
            
            if (member) {
                document.getElementById('memberId').value = member.id_anggota;
                document.getElementById('memberNIK').value = member.nik || '';
                document.getElementById('memberName').value = member.nama_anggota;
                document.getElementById('memberPhone').value = member.no_hp || '';
                document.getElementById('memberDate').value = member.tanggal_gabung || '';
                document.getElementById('memberAddress').value = member.alamat || '';
                document.getElementById('memberStatus').value = member.status || 'Aktif';
                document.getElementById('modalTitle').textContent = 'Edit Anggota';
                
                document.getElementById('memberModal').classList.remove('hidden');
                document.getElementById('memberModal').classList.add('flex');
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Data anggota tidak ditemukan!', confirmButtonColor: '#DC1B33' });
            }
        }

        function confirmDelete(id, name) {
            Swal.fire({
                title: 'Hapus Anggota?',
                html: `Apakah Anda yakin ingin menghapus <strong>${name}</strong>?<br>Data yang dihapus tidak dapat dikembalikan.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#DC1B33',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal',
                reverseButtons: true,
                customClass: { confirmButton: 'px-4 py-2 rounded-lg font-medium', cancelButton: 'px-4 py-2 rounded-lg font-medium ml-2' },
                buttonsStyling: false
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // NOTE: Kamu perlu menambahkan endpoint DELETE di api/anggota.js nanti
                        // Untuk sekarang kita tampilkan alert saja
                        Swal.fire({ icon: 'info', title: 'Info', text: 'Fitur hapus belum tersedia di API. Silakan tambahkan method DELETE di backend.' });
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
                    }
                }
            });
        }

        // HANDLE FORM SUBMIT (CREATE / UPDATE)
        document.getElementById('memberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Menyimpan...';
            btn.disabled = true;

            const id = document.getElementById('memberId').value;
            const payload = {
                nama_anggota: document.getElementById('memberName').value,
                nik: document.getElementById('memberNIK').value,
                no_hp: document.getElementById('memberPhone').value,
                tanggal_gabung: document.getElementById('memberDate').value,
                alamat: document.getElementById('memberAddress').value,
                status: document.getElementById('memberStatus').value
            };

            try {
                let res;
                if (id) {
                    // UPDATE (Perlu endpoint PUT di backend nanti)
                    Swal.fire({ icon: 'info', title: 'Info', text: 'Fitur update belum tersedia di API. Data baru akan ditambahkan sebagai entri baru.' });
                    res = await fetch('/api/anggota.js', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // CREATE
                    res = await fetch('/api/anggota.js', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: id ? 'Data diperbarui.' : 'Anggota baru berhasil ditambahkan.', timer: 1500, showConfirmButton: false });
                    closeMemberModal();
                    fetchMembers(); // Refresh tabel
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal!', text: data.error || 'Terjadi kesalahan.' });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error Jaringan', text: err.message });
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        document.getElementById('searchMember').addEventListener('input', renderMembers);
        
        // LOAD DATA SAAT HALAMAN DIBUKA
        document.addEventListener('DOMContentLoaded', fetchMembers);
    </script>
</body>
</html>
