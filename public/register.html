<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KoperasiKas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#DC1B33', dark: '#1e1e2e' } } } }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex overflow-hidden">

    <!-- BAGIAN KIRI (MERAH) - SAMA SEPERTI LOGIN -->
    <div class="hidden lg:flex w-1/2 bg-primary text-white flex-col justify-center p-16 relative overflow-hidden">
        <div class="absolute top-[-50px] right-[-50px] w-96 h-96 bg-white opacity-10 rounded-full"></div>
        <div class="relative z-10">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <span class="text-xl font-bold tracking-wide">KoperasiKas</span>
            </div>
            <h1 class="text-4xl font-extrabold leading-tight mb-6">Bergabung Bersama Kami</h1>
            <p class="text-white/80 text-base leading-relaxed max-w-md">Kelola keuangan koperasi Anda dengan lebih mudah, efisien, dan transparan.</p>
        </div>
    </div>

    <!-- BAGIAN KANAN (FORM REGISTER) -->
    <div class="w-full lg:w-1/2 bg-gray-50 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <a href="login.html" class="inline-flex items-center text-sm text-gray-500 hover:text-primary mb-6 transition">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Kembali ke Login
            </a>

            <h2 class="text-3xl font-bold text-gray-800 mb-2">Buat Akun Baru</h2>
            <p class="text-gray-500 mb-8">Daftar untuk mengelola koperasi Anda</p>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" id="fullname" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition" placeholder="Nama Anda" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition" placeholder="email@koperasi.id" required>
                </div>

                <!-- ROLE DIHAPUS DI SINI -->

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition" placeholder="Minimal 6 karakter" required>
                </div>

                <button type="submit" class="w-full py-3.5 bg-primary text-white font-semibold rounded-xl hover:bg-red-700 transition shadow-lg shadow-red-500/30 transform active:scale-[0.98]">
                    Daftar Sekarang
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulasi register berhasil (TETAP SAMA SEPERTI ASLINYA)
            showToast('Registrasi berhasil! Silakan login.', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        });
    </script>
</body>
</html>
